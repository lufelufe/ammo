cases:
  - id: ops-incident-1
    input: "서버 배포하다가 장애났어 롤백해줘"
    expect:
      system: ops
      roles: [triage, operator, rollback_critic]
      tools: [shell.run]
      confidence_max: medium
  - id: ops-recovery-1
    input: "서버 장애 원인 분석하고 복구해줘"
    expect:
      system: ops
      roles: [triage, operator, rollback_critic]
      tools: [shell.run]
      confidence_max: medium
  # advisory ops question — still ops-routed, rollback_critic stays in the loop
  - id: ops-advisory-1
    input: "서버 모니터링 어떻게 설정하는 게 좋을까?"
    expect:
      system: ops
      roles: [triage, operator, rollback_critic]
      tools: [shell.run]
      confidence_max: medium
  - id: ops-deploy-english-1
    input: "deploy the new version to production"
    expect:
      system: ops
      roles: [triage, operator, rollback_critic]
      tools: [shell.run]
      confidence_max: medium
