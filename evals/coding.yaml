cases:
  # advisory/trivial coding must NOT be oversized to the 4-seat high-risk team
  # (regression guard for the right-sizing rule, shipped 227f5af)
  - id: coding-advisory-1
    input: "이 함수 이름 뭐가 좋을지 조언해줘"
    expect:
      system: coding
      roles: [builder, critic]
      tools: [fs.read, fs.write, git, shell.run]
      confidence_max: medium
  - id: coding-trivial-english-1
    input: "add a docstring to this function"
    expect:
      system: coding
      roles: [builder, critic]
      tools: [fs.read, fs.write, git, shell.run]
      confidence_max: medium
  # refactor + run tests → the full high-risk pipeline including the test seat
  - id: coding-refactor-tests-1
    input: "이 모듈 리팩토링하고 테스트 돌려줘"
    expect:
      system: coding
      roles: [planner, builder, critic, test_runner]
      tools: [fs.read, fs.write, git, shell.run]
      confidence_max: medium
  - id: coding-debug-tests-1
    input: "이 python repo 버그 고치고 테스트 추가해줘"
    expect:
      system: coding
      roles: [planner, builder, critic, test_runner]
      tools: [fs.read, fs.write, git, shell.run]
      confidence_max: medium
  - id: coding-english-1
    input: "fix the bug in this python repo and add tests"
    expect:
      system: coding
      roles: [planner, builder, critic, test_runner]
      tools: [fs.read, fs.write, git, shell.run]
      confidence_max: medium
