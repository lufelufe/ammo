# Eval cases for the personal domain. Expectations reflect AMMO's current
# deterministic (static, mock) behavior; re-run over time to track improvement.
cases:
  - id: personal-briefing-1
    input: "오늘 할 일 정리해줘"
    expect:
      system: personal
      roles: [analyst, synthesizer]   # routed by the pack's 'briefing' workflow
      tools: [web.search, web.fetch]
      confidence_max: medium
  # scheduling — personal briefing pipeline without web tools
  - id: personal-schedule-1
    input: "내일 회의 일정 정리해줘"
    expect:
      system: personal
      roles: [analyst, synthesizer]
      tools: []
      confidence_max: medium
