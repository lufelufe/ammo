# Registry of MODEL nodes for the Capability Graph. Models are plugins; AMMO is
# the IP. The kernel selects models by CAPABILITY (roles, capabilities, cost,
# latency, context, warmth) — never by hard-coded name.
#
# NO secrets. `credentials_env` lists only variable NAMES (empty here). Every
# entry below is a MOCK / planned node — no real model is called anywhere yet.
# Adapter-mechanism details (api_mode, auth_type, ...) live at the adapter layer
# (Phase 9); see docs/MODEL_ADAPTER_SPEC.md.
apiVersion: ammo/v1
kind: ModelRegistry
models:
  - id: claude_a_opus
    provider: anthropic
    adapter: ammo.adapters.claude_code
    roles: [router, analyst, synthesizer]
    capabilities: [planning, reasoning, analysis, general]
    context_window: 200000
    cost_class: premium        # cheap | standard | premium
    latency_class: medium      # fast | medium | slow
    warm_status: warm          # warm | cold
    enabled: true
    status: mock
    credentials_env: []

  - id: codex_gpt5
    provider: openai
    adapter: ammo.adapters.codex
    roles: [implementer, reviewer]
    capabilities: [coding]
    context_window: 128000
    cost_class: standard
    latency_class: medium
    warm_status: cold
    enabled: true
    status: mock
    credentials_env: []

  # id = {provider}_{model}: account B running Claude Fable 5 (claude-fable-5),
  # Anthropic's most capable model. Capable across the board, so it carries broad
  # roles. The seat it plays is decided by the role assignment (ammo.config.yaml
  # `roles`), not by this id.
  - id: claude_b_fable
    provider: anthropic
    adapter: ammo.adapters.claude_code
    roles: [router, analyst, synthesizer, critic, reviewer]
    capabilities: [planning, reasoning, analysis, general, review]
    context_window: 1000000
    cost_class: premium
    latency_class: medium
    warm_status: warm
    enabled: true
    status: mock
    credentials_env: []

  - id: qwen_planner_mock
    provider: oss
    adapter: ammo.adapters.local
    roles: [router, analyst, synthesizer]
    capabilities: [planning, analysis, general]
    context_window: 32000
    cost_class: cheap
    latency_class: fast
    warm_status: cold
    enabled: true
    status: mock
    credentials_env: []

  - id: kimi_coder_mock
    provider: oss
    adapter: ammo.adapters.local
    roles: [implementer]
    capabilities: [coding]
    context_window: 128000
    cost_class: cheap
    latency_class: medium
    warm_status: cold
    enabled: true
    status: mock
    credentials_env: []

  - id: gpt_oss_critic_mock
    provider: oss
    adapter: ammo.adapters.local
    roles: [critic, reviewer]
    capabilities: [review, analysis]
    context_window: 32000
    cost_class: cheap
    latency_class: fast
    warm_status: cold
    enabled: true
    status: mock
    credentials_env: []

  - id: fast_worker_mock
    provider: oss
    adapter: ammo.adapters.local
    roles: [analyst, synthesizer, implementer]
    capabilities: [general, writing]
    context_window: 8000
    cost_class: cheap
    latency_class: fast
    warm_status: warm
    enabled: true
    status: mock
    credentials_env: []

  # Real workers reached through the SAME authenticated claude CLI via
  # --model — one subscription, several models: the diversity the learning
  # loop needs. Live-verified 2026-07-02 (haiku $0.0009, sonnet $0.0023/call).
  - id: claude_a_haiku
    provider: anthropic
    adapter: ammo.adapters.claude_code
    roles: [analyst, synthesizer, implementer]
    capabilities: [general, writing, summarization]
    context_window: 200000
    cost_class: cheap
    latency_class: fast
    warm_status: warm
    enabled: true
    status: real
    credentials_env: []

  - id: claude_a_sonnet
    provider: anthropic
    adapter: ammo.adapters.claude_code
    roles: [analyst, reviewer]
    capabilities: [analysis, general, writing]
    context_window: 200000
    cost_class: standard
    latency_class: fast
    warm_status: warm
    enabled: true
    status: real
    credentials_env: []

  # Infrastructure runner — a harness, not an LLM. Registered here so the
  # test_runner seat resolves through the same capability scoring as everyone
  # else (its exclusive test_execution capability + role make it the only
  # qualified candidate); previously a synthetic FIXED_MODELS id.
  - id: local_test_runner
    provider: infra
    adapter: ammo.adapters.local
    roles: [test_runner]
    capabilities: [test_execution]
    context_window: 1
    cost_class: cheap
    latency_class: fast
    warm_status: warm
    enabled: true
    status: infra
    credentials_env: []
